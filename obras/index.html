<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Construbox — Obras</title>
  <link rel="stylesheet" href="../assets/core.css"/>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-titulo">Obras</div>
      <div class="topbar-sub" id="header-sub">Carregando...</div>
    </div>
    <div class="topbar-acoes">
      <button class="btn btn-outline btn-sm no-print" onclick="init()" title="Buscar dados atualizados do GitHub">🔄 Sincronizar</button>
      <div class="sync-pill">
        <div class="sync-dot amarelo" id="sync-dot"></div>
        <span id="sync-texto">Conectando</span>
      </div>
    </div>
  </div>
  <div class="page">
    <div class="stats-grid">
      <div class="stat"><div class="valor" id="st-total">0</div><div class="rotulo">Total de Obras</div></div>
      <div class="stat verde"><div class="valor" id="st-ativas">0</div><div class="rotulo">Ativas</div></div>
      <div class="stat amarelo"><div class="valor" id="st-contrato">R$ 0</div><div class="rotulo">Valor Total Contratos</div></div>
      <div class="stat azul"><div class="valor" id="st-concluidas">0</div><div class="rotulo">Concluídas</div></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-body" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="busca" placeholder="🔍 Buscar obra..." class="form-control" style="flex:1;min-width:200px;" oninput="renderLista()"/>
        <select id="filtro-status" class="form-control" style="width:140px;" onchange="renderLista()">
          <option value="">Todos os status</option>
          <option value="ativa">Ativa</option>
          <option value="concluida">Concluída</option>
          <option value="paralisada">Paralisada</option>
        </select>
        <button class="btn btn-primary" onclick="abrirModal()">+ Nova Obra</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>🏗️ Lista de Obras</h2></div>
      <div class="card-body">
        <div id="lista-container"><div style="text-align:center;padding:48px;color:var(--texto-leve);">Carregando...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL OBRA -->
<div class="overlay" id="modal-obra">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h2 id="modal-titulo">Nova Obra</h2>
      <button class="btn-fechar" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px;padding:0 20px 4px;">
      <!-- SEÇÃO MODELO (só nova obra) -->
      <div id="modelo-section" style="background:var(--fundo2);border:1px solid var(--cinza);border-radius:8px;padding:12px 14px;">
        <div style="font-size:.75rem;font-weight:700;color:var(--texto-leve);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">📐 Modelo de Obra</div>
        <div style="display:grid;grid-template-columns:1fr 180px;gap:12px;align-items:end;">
          <div class="form-campo" style="margin:0">
            <label>Usar modelo</label>
            <select id="f-modelo" onchange="onModeloChange()">
              <option value="">— Obra avulsa (sem modelo) —</option>
            </select>
          </div>
          <div class="form-campo" style="margin:0;" id="f-boxes-wrap" style="display:none;">
            <label>Qtd. de <span id="f-unidade-lbl">boxes</span></label>
            <input type="number" id="f-boxes" value="1" min="1" step="1"/>
          </div>
        </div>
        <div id="modelo-info" style="display:none;margin-top:8px;font-size:.78rem;color:var(--texto-leve);background:var(--branco);border-radius:6px;padding:6px 10px;border:1px solid var(--cinza);"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 140px 200px;gap:12px;">
        <div class="form-campo"><label>Nome da Obra *</label><input type="text" id="f-nome" placeholder="Ex: Residência Rua das Flores"/></div>
        <div class="form-campo"><label>Status</label>
          <select id="f-status">
            <option value="ativa">Ativa</option>
            <option value="paralisada">Paralisada</option>
            <option value="concluida">Concluída</option>
          </select>
        </div>
        <div class="form-campo"><label>Material da Obra</label>
          <select id="f-mat-resp">
            <option value="cliente">Por conta do Cliente</option>
            <option value="empresa">Por conta da Empresa</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 140px 150px;gap:12px;">
        <div class="form-campo"><label>Cliente *</label><input type="text" id="f-cliente" placeholder="Nome do cliente"/></div>
        <div class="form-campo"><label>Valor do Contrato (R$)</label><input type="number" id="f-contrato" placeholder="0,00" step="0.01"/></div>
        <div class="form-campo"><label>Orçamento MO (R$)</label><input type="number" id="f-mo" placeholder="0,00" step="0.01" title="Valor total de mão de obra previsto para esta obra"/></div>
      </div>
      <div class="form-campo"><label>Endereço da Obra</label><input type="text" id="f-endereco" placeholder="Rua, número, bairro, cidade"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-campo"><label>Data de Início</label><input type="date" id="f-inicio"/></div>
        <div class="form-campo"><label>Previsão de Conclusão</label><input type="date" id="f-previsao"/></div>
      </div>
      <div class="form-campo"><label>Observações</label><textarea id="f-obs" rows="3" placeholder="Informações adicionais sobre a obra..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-success" onclick="salvar()">✓ Salvar Obra</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="../assets/core.js"></script>
<script>
const DATA_PATH = 'data/obras.json';
const LS_KEY    = 'cbx_obras';
document.getElementById('sidebar-placeholder').innerHTML = buildSidebar('obras');

let lista = []; let sha = null; let idEditando = null;
let modelos = [];

async function init() {
  const cfg = getConfig();
  modelos = carregarLocal('cbx_modelos') || [];
  if (!configurado()) {
    setSyncStatus('vermelho', 'Não configurado');
    const l = carregarLocal(LS_KEY); if (l) { lista = l; atualizarStats(); renderLista(); }
    popularSelectModelos();
    return;
  }
  setSyncStatus('amarelo', 'Carregando...');
  document.getElementById('header-sub').textContent = `${cfg.owner}/${cfg.repo}`;
  try {
    const [resObras, resMod] = await Promise.all([
      carregarDados(DATA_PATH),
      carregarDados('data/modelos.json').catch(()=>({lista:[],sha:null})),
    ]);
    lista = resObras.lista; sha = resObras.sha;
    modelos = resMod.lista || [];
    salvarLocal(LS_KEY, lista);
    salvarLocal('cbx_modelos', modelos);
    atualizarStats(); renderLista();
    popularSelectModelos();
    setSyncStatus('verde', 'Conectado');
  } catch(e) {
    setSyncStatus('vermelho', 'Erro');
    const l = carregarLocal(LS_KEY); if (l) { lista = l; atualizarStats(); renderLista(); toast('Cache local.', 'aviso'); }
    else toast('Erro ao carregar.', 'erro');
    modelos = carregarLocal('cbx_modelos') || [];
    popularSelectModelos();
  }
}

function atualizarStats() {
  document.getElementById('st-total').textContent     = lista.length;
  document.getElementById('st-ativas').textContent    = lista.filter(o => o.status === 'ativa').length;
  document.getElementById('st-concluidas').textContent= lista.filter(o => o.status === 'concluida').length;
  const total = lista.reduce((s, o) => s + (o.valorContrato || 0), 0);
  document.getElementById('st-contrato').textContent  = formatarMoeda(total);
}

function renderLista() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const fSt   = document.getElementById('filtro-status').value;
  let f = lista.filter(o => {
    if (fSt && o.status !== fSt) return false;
    if (busca && !(`${o.nome} ${o.cliente} ${o.endereco||''}`).toLowerCase().includes(busca)) return false;
    return true;
  });
  const cont = document.getElementById('lista-container');
  if (!f.length) {
    cont.innerHTML = `<div style="text-align:center;padding:48px;color:var(--texto-leve);">${lista.length?'Nenhuma obra encontrada.':'Nenhuma obra cadastrada. Clique em "+ Nova Obra" para começar.'}</div>`;
    return;
  }
  const stMap = { ativa:'verde', concluida:'azul', paralisada:'amarelo' };
  const stLbl = { ativa:'Ativa', concluida:'Concluída', paralisada:'Paralisada' };
  cont.innerHTML = `<table class="tabela" style="width:100%;">
    <thead><tr><th>Nome da Obra</th><th>Cliente</th><th>Valor Contrato</th><th>Orçamento MO</th><th>Material</th><th>Início</th><th>Previsão</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody>${f.map(o => `<tr>
      <td><strong>${hl(o.nome,busca)}</strong>${o.endereco?`<div style="font-size:0.73rem;color:var(--texto-leve);">${esc(o.endereco)}</div>`:''}</td>
      <td>${hl(o.cliente||'—',busca)}</td>
      <td>${o.valorContrato?formatarMoeda(o.valorContrato):'—'}</td>
      <td>${o.valorMaoDeObra?formatarMoeda(o.valorMaoDeObra):'—'}</td>
      <td>${o.responsavelMaterial==='empresa'?'<span class="badge azul">Empresa</span>':'<span class="badge cinza">Cliente</span>'}</td>
      <td>${o.dataInicio?formatarData(o.dataInicio):'—'}</td>
      <td>${o.previsaoConclusao?formatarData(o.previsaoConclusao):'—'}</td>
      <td><span class="badge ${stMap[o.status]||'cinza'}">${stLbl[o.status]||o.status}</span></td>
      <td><div style="display:flex;gap:4px;">
        <a href="cronograma/?obra=${o.id}" class="btn btn-primary btn-sm" title="Cronograma da Obra">📋 Cronograma</a>
        <button class="btn btn-outline btn-sm" onclick='editar(${JSON.stringify(o.id)})'>✏️</button>
        <a href="../relatorios/?obra=${o.id}" class="btn btn-outline btn-sm" title="Relatório">📈</a>
        <button class="btn btn-outline btn-sm" style="color:var(--vermelho);" onclick='excluir(${JSON.stringify(o.id)})'>🗑</button>
      </div></td>
    </tr>`).join('')}</tbody></table>`;
}

function popularSelectModelos() {
  const sel = document.getElementById('f-modelo');
  if (!sel) return;
  const val = sel.value;
  sel.innerHTML = '<option value="">— Obra avulsa (sem modelo) —</option>';
  modelos.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.nome;
    sel.appendChild(opt);
  });
  sel.value = val;
}

function onModeloChange() {
  const val = document.getElementById('f-modelo').value;
  const wrap = document.getElementById('f-boxes-wrap');
  const info = document.getElementById('modelo-info');
  if (val) {
    wrap.style.display = '';
    const m = modelos.find(x=>x.id===val);
    if (m) {
      document.getElementById('f-unidade-lbl').textContent = m.unidade||'boxes';
      document.getElementById('f-boxes').value = 1;
      const nEt = (m.etapas||[]).length;
      const nMat = (m.etapas||[]).reduce((s,e)=>s+(e.materiais||[]).length,0);
      const custo = (m.etapas||[]).reduce((s,e)=>s+(e.materiais||[]).reduce((a,mat)=>a+(mat.valorUnitario||0)*(mat.qtdPorBox||0),0),0);
      info.style.display = '';
      info.innerHTML = `📐 <strong>${esc(m.nome)}</strong> · ${nEt} etapa(s) · ${nMat} material(is) · Custo por ${m.unidade||'box'}: <strong>${custo?formatarMoeda(custo):'—'}</strong>`;
    }
  } else {
    wrap.style.display = 'none';
    info.style.display = 'none';
  }
}

function abrirModal() {
  idEditando = null;
  document.getElementById('modal-titulo').textContent = 'Nova Obra';
  ['f-nome','f-cliente','f-endereco','f-obs'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-status').value    = 'ativa';
  document.getElementById('f-mat-resp').value  = 'cliente';
  document.getElementById('f-contrato').value = '';
  document.getElementById('f-mo').value       = '';
  document.getElementById('f-inicio').value   = '';
  document.getElementById('f-previsao').value = '';
  // reset modelo
  document.getElementById('modelo-section').style.display = '';
  document.getElementById('f-modelo').value = '';
  document.getElementById('f-boxes-wrap').style.display = 'none';
  document.getElementById('modelo-info').style.display = 'none';
  document.getElementById('modal-obra').classList.add('aberto');
  setTimeout(()=>document.getElementById('f-nome').focus(),80);
}

function editar(id) {
  const o = lista.find(x=>x.id===id); if(!o) return;
  idEditando = id;
  document.getElementById('modal-titulo').textContent = 'Editar Obra';
  // ocultar seção modelo na edição
  document.getElementById('modelo-section').style.display = 'none';
  document.getElementById('f-nome').value      = o.nome||'';
  document.getElementById('f-cliente').value   = o.cliente||'';
  document.getElementById('f-endereco').value  = o.endereco||'';
  document.getElementById('f-status').value    = o.status||'ativa';
  document.getElementById('f-mat-resp').value  = o.responsavelMaterial||'cliente';
  document.getElementById('f-contrato').value  = o.valorContrato||'';
  document.getElementById('f-mo').value        = o.valorMaoDeObra||'';
  document.getElementById('f-inicio').value    = o.dataInicio||'';
  document.getElementById('f-previsao').value  = o.previsaoConclusao||'';
  document.getElementById('f-obs').value       = o.obs||'';
  document.getElementById('modal-obra').classList.add('aberto');
}

function fecharModal() { document.getElementById('modal-obra').classList.remove('aberto'); }

async function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { toast('Nome da obra é obrigatório.','erro'); return; }
  const modeloId  = !idEditando ? (document.getElementById('f-modelo').value||null) : null;
  const qtdBoxes  = modeloId ? (parseInt(document.getElementById('f-boxes').value)||1) : null;
  const modeloSel = modeloId ? modelos.find(x=>x.id===modeloId) : null;
  const obra = {
    id:               idEditando || uid(),
    nome,
    cliente:          document.getElementById('f-cliente').value.trim(),
    endereco:         document.getElementById('f-endereco').value.trim(),
    status:           document.getElementById('f-status').value,
    valorContrato:    parseFloat(document.getElementById('f-contrato').value)||0,
    valorMaoDeObra:      parseFloat(document.getElementById('f-mo').value)||0,
    responsavelMaterial: document.getElementById('f-mat-resp').value||'cliente',
    dataInicio:       document.getElementById('f-inicio').value||null,
    previsaoConclusao:document.getElementById('f-previsao').value||null,
    obs:              document.getElementById('f-obs').value.trim(),
    modeloId:         modeloId || (idEditando?(lista.find(x=>x.id===idEditando)?.modeloId||null):null),
    modeloNome:       modeloSel?.nome || (idEditando?(lista.find(x=>x.id===idEditando)?.modeloNome||null):null),
    modeloUnidade:    modeloSel?.unidade || (idEditando?(lista.find(x=>x.id===idEditando)?.modeloUnidade||null):null),
    qtdBoxes:         qtdBoxes ?? (idEditando?(lista.find(x=>x.id===idEditando)?.qtdBoxes||null):null),
    criadoEm:         idEditando?(lista.find(x=>x.id===idEditando)?.criadoEm||hoje()):hoje(),
  };
  lista = idEditando ? lista.map(x=>x.id===idEditando?obra:x) : [...lista,obra];
  salvarLocal(LS_KEY, lista);
  fecharModal(); atualizarStats(); renderLista();
  toast('Obra salva!','sucesso');
  if(configurado()){
    setSyncStatus('amarelo','Sincronizando...');
    try{
      sha = await salvarDados(DATA_PATH,lista,sha,`Obra: ${obra.nome}`);
      setSyncStatus('verde','Sincronizado');
    } catch(e){ setSyncStatus('vermelho','Erro sync'); toast('Erro sync: '+e.message,'aviso'); return; }
    // gerar etapas se obra nova com modelo
    if (!idEditando && modeloSel) {
      const nEt = (modeloSel.etapas||[]).length;
      setSyncStatus('amarelo', `Gerando ${nEt} etapas…`);
      try {
        const n = await gerarEtapasDoModelo(obra.id, modeloSel, qtdBoxes);
        toast(`✓ ${n} etapas criadas automaticamente (${qtdBoxes}× ${modeloSel.unidade||'box'})!`, 'sucesso');
        setSyncStatus('verde', 'Etapas criadas');
      } catch(e) {
        toast('Obra salva, erro ao gerar etapas: '+e.message, 'aviso');
      }
    }
  }
}

async function gerarEtapasDoModelo(obraId, modelo, qtdBoxes) {
  // buscar SHA atual das etapas
  let etapasAtuais = carregarLocal('cbx_etapas') || [];
  let shaEt = null;
  try {
    const res = await carregarDados('data/etapas.json');
    etapasAtuais = res.lista || []; shaEt = res.sha;
  } catch(e) { /* usa local */ }

  const novas = (modelo.etapas||[]).map((et, idx) => ({
    id: uid(), obraId,
    nome:        et.nome,
    codigo:      et.codigo || String(idx+1).padStart(2,'0'),
    ordem:       et.ordem  || idx+1,
    categoria:   et.categoria   || 'outros',
    responsavel: et.responsavel || '',
    descricao:   et.descricao   || '',
    observacoes: '',
    status:      'planejada',
    peso:        et.peso || 0,
    percentualExecutado: 0,
    dataPrevistoInicio: null, dataPrevistoFim: null,
    dataRealInicio:     null, dataRealFim:     null,
    dependencias: [],
    checklist:  (et.checklist||[]).map(cl=>({...cl, id:uid(), concluida:false})),
    materiais:  (et.materiais||[]).map(mat=>({
      id: uid(), nome: mat.nome,
      unidade:       mat.unidade||'',
      classificacao: mat.classificacao||'obrigatorio_iniciar',
      qtdPrevista:   Math.round((mat.qtdPorBox||0) * qtdBoxes * 100)/100,
      qtdMinIniciar: Math.round((mat.qtdMinPorBox||mat.qtdPorBox||0) * qtdBoxes * 100)/100,
      qtdComprada:0, qtdEntregue:0, qtdReservada:0, qtdUtilizada:0,
      fornecedor:    mat.fornecedor||'',
      valorPrevisto: Math.round((mat.valorUnitario||0)*(mat.qtdPorBox||0)*qtdBoxes*100)/100,
      valorComprado: 0, pedidoCompra:false, solicitacaoData:null, obs:'',
      modeloRef:     mat.id,
    })),
    criadoEm:          hoje(),
    geradoDeModelo:    modelo.id,
  }));

  const merged = [...etapasAtuais, ...novas];
  salvarLocal('cbx_etapas', merged);
  await salvarDados('data/etapas.json', merged, shaEt, `Etapas: ${modelo.nome} ×${qtdBoxes}`);
  return novas.length;
}

async function excluir(id) {
  const o = lista.find(x=>x.id===id); if(!o) return;
  if(!confirm(`Excluir a obra "${o.nome}"?`)) return;
  lista = lista.filter(x=>x.id!==id);
  salvarLocal(LS_KEY, lista); atualizarStats(); renderLista();
  toast('Obra excluída.','sucesso');
  if(configurado()){ try{ sha=await salvarDados(DATA_PATH,lista,sha,`Excluir obra: ${o.nome}`); }catch(e){toast('Erro sync','aviso');} }
}

init();
</script>
</body>
</html>
