<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Construbox — Classificar Extrato</title>
  <link rel="stylesheet" href="../assets/core.css"/>
  <style>
    .linha-ext {
      display: grid;
      grid-template-columns: 90px 54px 110px 1fr 155px 150px 150px 170px 80px;
      gap: 8px; align-items: center;
      padding: 9px 14px; border-bottom: 1px solid var(--cinza);
      transition: background .15s;
    }
    .linha-ext:hover { background: var(--fundo2); }
    .linha-ext.lancada { opacity: .45; background: var(--fundo2); }
    .linha-ext.ignorada { opacity: .3; }
    .linha-ext.credito { border-left: 3px solid var(--verde); }
    .linha-ext.debito  { border-left: 3px solid var(--vermelho); }
    .linha-ext.lancada.credito,
    .linha-ext.lancada.debito { border-left-color: var(--cinza); }
    .val-c { color: var(--verde);    font-weight: 700; font-size:.9rem; }
    .val-d { color: var(--vermelho); font-weight: 700; font-size:.9rem; }
    .memo-txt { font-size: .78rem; color: var(--texto-leve); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thead-ext {
      display: grid;
      grid-template-columns: 90px 54px 110px 1fr 155px 150px 150px 170px 80px;
      gap: 8px; padding: 8px 14px;
      background: var(--fundo2); border-bottom: 2px solid var(--cinza);
      font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--texto-leve);
      position: sticky; top: 0; z-index: 5;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }
    .pill-ok  { background: #d1fae5; color: #065f46; }
    .pill-ign { background: var(--fundo2); color: var(--texto-leve); border: 1px solid var(--cinza); }
    .pill-pend{ background: #fef3c7; color: #92400e; }
    select.sel-cat, select.sel-obra { font-size: .8rem; padding: 4px 6px; }
    input.inp-desc { font-size: .8rem; padding: 4px 6px; }
    .filtros-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .chip {
      padding: 4px 14px; border-radius: 999px; font-size: .8rem; cursor: pointer;
      border: 1px solid var(--cinza); background: var(--branco); font-weight: 600;
      transition: all .15s;
    }
    .chip.ativo { background: var(--brand); color: #fff; border-color: var(--brand); }
    .resumo-bar { display: flex; gap: 16px; flex-wrap: wrap; font-size: .83rem; padding: 6px 0; }
    .res-item { display: flex; gap: 6px; align-items: center; }
    .res-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-titulo">Classificar Extrato</div>
      <div class="topbar-sub">Nubank — 929833485-8 · 01/05/2026 a 17/07/2026</div>
    </div>
    <div class="topbar-acoes">
      <div class="sync-pill">
        <div class="sync-dot amarelo" id="sync-dot"></div>
        <span id="sync-texto">Conectando</span>
      </div>
    </div>
  </div>
  <div class="page">

    <div class="stats-grid">
      <div class="stat verde"><div class="valor" id="st-lanc">0</div><div class="rotulo">Lançados</div></div>
      <div class="stat amarelo"><div class="valor" id="st-pend">0</div><div class="rotulo">Pendentes</div></div>
      <div class="stat cinza"><div class="valor" id="st-ign">0</div><div class="rotulo">Ignorados</div></div>
      <div class="stat azul"><div class="valor" id="st-total">0</div><div class="rotulo">Total linhas</div></div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-body" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:space-between;">
        <div class="filtros-bar">
          <span style="font-size:.8rem;font-weight:700;color:var(--texto-leve);">Mostrar:</span>
          <button class="chip ativo" id="chip-pend" onclick="setFiltro('pendentes')">Pendentes</button>
          <button class="chip"       id="chip-all"  onclick="setFiltro('todos')">Todos</button>
          <button class="chip"       id="chip-lanc" onclick="setFiltro('lancados')">Lançados</button>
          <button class="chip"       id="chip-ign"  onclick="setFiltro('ignorados')">Ignorados</button>
        </div>
        <div class="resumo-bar" id="resumo-bar"></div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div class="thead-ext">
        <div>Data</div><div>Tipo</div><div>Valor</div>
        <div>Descrição original</div>
        <div>Categoria</div><div>Obra</div><div>Cliente / Sócio</div><div>Sua descrição</div><div>Ação</div>
      </div>
      <div id="lista-ext"></div>
    </div>

  </div>
</div>
<div class="toast-container" id="toasts"></div>
<script src="../assets/core.js"></script>

// ── SUGESTÃO AUTOMÁTICA ──
function sugerirCategoria(t) {
  const m = t.memo.toUpperCase();
  if (t.tipo === 'credito') {
    if (m.includes('HOTEL IN BOX') || m.includes('HOTEL INBOX')) return { cat: 'recebimento', tipo: 'receita' };
    if (m.includes('LUCAS REGHINI')) return { cat: 'outros-rec', tipo: 'receita' };
    if (m.includes('RDB')) return { cat: 'ignorar', tipo: 'ignorar' };
    return { cat: '', tipo: 'receita' };
  }
  if (m.includes('RDB')) return { cat: 'ignorar', tipo: 'ignorar' };
  if (m.includes('EDILSON') || m.includes('GEOVANE') || m.includes('MARCOS DE ANDRADE') || m.includes('M A XAVIER') || m.includes('VITOR SIQUEIRA') || m.includes('BERNARDO AGUILERA') || m.includes('JONATAN') || m.includes('ANDRE LUIZ SILVA') || m.includes('MARCOS XA')) return { cat: 'mao-de-obra', tipo: 'despesa' };
  if (m.includes('PLINIO DE PAULA') || m.includes('PDN HOLDING') || m.includes('MARLI APARECIDA')) return { cat: 'distribuicao', tipo: 'despesa' };
  return { cat: '', tipo: 'despesa' };
}

function sugerirObra(t) {
  const m = t.memo.toUpperCase();
  if (m.includes('EDILSON') || m.includes('UBER') || m.includes('QUERO PASSAGEM')) return 'obra_novamutum';
  if (m.includes('GEOVANE') || m.includes('BERNARDO AGUILERA')) return 'obra_sinop';
  if (m.includes('VITOR SIQUEIRA')) return 'obra_itu';
  if (m.includes('MARCOS DE ANDRADE') || m.includes('M A XAVIER') || m.includes('MARCOS XA')) return 'obra_rionegro';
  return '';
}

// ── STATE ──
const LS_EST = 'cbx_extrato_estado_v2';
const LS_LANC = 'cbx_lanc';
let estado = carregarLocal(LS_EST) || {};
let lancamentos = carregarLocal(LS_LANC) || [];
let shaLanc = null;
let obras = [];
let socios = [];
let clientes = [];
let filtro = 'pendentes';

function getEstado(id) { return estado[id] || { status: 'pendente', cat: '', obra: '', descricao: '', tipo: '' }; }
function setEstado(id, patch) { estado[id] = { ...getEstado(id), ...patch }; salvarLocal(LS_EST, estado); }

// ── INIT ──
async function init() {
  obras    = carregarLocal('cbx_obras')    || [];
  socios   = carregarLocal('cbx_socios')   || [];
  clientes = carregarLocal('cbx_clientes') || [];
  lancamentos = carregarLocal(LS_LANC) || [];

  // Auto-sugerir para os ainda pendentes
  OFX_TRANSACOES.forEach(t => {
    if (!estado[t.id] || estado[t.id].status === 'pendente') {
      const s = sugerirCategoria(t);
      const o = sugerirObra(t);
      const atual = getEstado(t.id);
      if (!atual.cat && s.cat) setEstado(t.id, { cat: s.cat, tipo: s.tipo, obra: atual.obra || o });
      else if (!atual.obra && o) setEstado(t.id, { obra: o });
      // Auto-sugerir cliente Hotel Inbox para recebimentos
      if ((s.cat === 'recebimento') && !atual.clienteId) {
        const hib = clientes.find(c => c.cnpj && c.cnpj.replace(/\D/g,'') === '51798185000162');
        if (hib) setEstado(t.id, { clienteId: hib.id });
      }
    }
  });

  renderLista();
  atualizarStats();

  if (!configurado()) { setSyncStatus('vermelho', 'Não configurado'); return; }
  setSyncStatus('amarelo', 'Carregando...');
  try {
    const [rL, rO, rS, rC] = await Promise.all([
      carregarDados('data/lancamentos.json'),
      carregarDados('data/obras.json'),
      carregarDados('data/socios.json'),
      carregarDados('data/clientes.json'),
    ]);
    lancamentos = rL.lista; shaLanc = rL.sha;
    obras    = rO.lista;
    socios   = rS.lista;
    clientes = rC.lista;
    salvarLocal(LS_LANC,         lancamentos);
    salvarLocal('cbx_obras',     obras);
    salvarLocal('cbx_socios',    socios);
    salvarLocal('cbx_clientes',  clientes);

    // Re-aplicar sugestão de cliente após carregar
    OFX_TRANSACOES.forEach(t => {
      const est = getEstado(t.id);
      if (est.cat === 'recebimento' && !est.clienteId) {
        const hib = clientes.find(c => c.cnpj && c.cnpj.replace(/\D/g,'') === '51798185000162');
        if (hib) setEstado(t.id, { clienteId: hib.id });
      }
    });

    renderLista();
    setSyncStatus('verde', 'Conectado');
  } catch(e) { setSyncStatus('vermelho', 'Erro ao conectar'); }
}

// ── FILTRO ──
function setFiltro(f) {
  filtro = f;
  ['pend','all','lanc','ign'].forEach(k => document.getElementById('chip-'+k)?.classList.remove('ativo'));
  const mapa = { pendentes:'pend', todos:'all', lancados:'lanc', ignorados:'ign' };
  document.getElementById('chip-'+mapa[f])?.classList.add('ativo');
  renderLista();
}

// ── RENDER ──
function renderLista() {
  const obraOpts = obras.map(o => `<option value="${o.id}">${esc(o.nome)}</option>`).join('');

  const lista = OFX_TRANSACOES.filter(t => {
    const s = getEstado(t.id).status;
    if (filtro === 'pendentes') return s === 'pendente';
    if (filtro === 'lancados')  return s === 'lancado';
    if (filtro === 'ignorados') return s === 'ignorado';
    return true;
  });

  const cont = document.getElementById('lista-ext');
  if (!lista.length) {
    cont.innerHTML = `<div style="text-align:center;padding:48px;color:var(--texto-leve);">Nenhum item nesta visualização.</div>`;
    atualizarStats(); return;
  }

  cont.innerHTML = lista.map(t => {
    const est = getEstado(t.id);
    const lancado  = est.status === 'lancado';
    const ignorado = est.status === 'ignorado';
    const cls = `linha-ext ${t.tipo} ${lancado?'lancada':''} ${ignorado?'ignorada':''}`;
    const pill = lancado  ? `<span class="status-pill pill-ok">✓ Lançado</span>` :
                 ignorado ? `<span class="status-pill pill-ign">Ignorado</span>` :
                            `<span class="status-pill pill-pend">Pendente</span>`;

    const dis = lancado || ignorado ? 'disabled' : '';

    const catSel = `<select class="form-control sel-cat" id="cat-${t.id}" onchange="onCatChange('${t.id}')" ${dis}>
      <option value="">— Categoria —</option>
      <option value="recebimento"  ${est.cat==='recebimento'?'selected':''}>💰 Recebimento</option>
      <option value="mao-de-obra"  ${est.cat==='mao-de-obra'?'selected':''}>🔨 Mão de Obra</option>
      <option value="distribuicao" ${est.cat==='distribuicao'?'selected':''}>💸 Dist. de Lucro</option>
      <option value="outros"       ${est.cat==='outros'?'selected':''}>📦 Outros</option>
      <option value="ignorar"      ${est.cat==='ignorar'?'selected':''}>— Ignorar</option>
    </select>`;

    // Obra — oculta para distribuição de lucro
    const obraSel = est.cat === 'distribuicao' ? `<div style="font-size:.73rem;color:var(--texto-leve);padding:4px 0;">—</div>` :
      `<select class="form-control sel-obra" id="obra-${t.id}" onchange="setEstado('${t.id}',{obra:this.value})" ${dis}>
        <option value="">— Obra —</option>
        ${obraOpts.replace(`value="${est.obra}"`, `value="${est.obra}" selected`)}
      </select>`;

    // Coluna extra: Cliente (recebimento) ou Sócio (distribuição)
    let extraSel = `<div style="font-size:.73rem;color:var(--texto-leve);padding:4px 0;">—</div>`;
    if (est.cat === 'recebimento') {
      const cliOpts = clientes.map(c =>
        `<option value="${c.id}" ${est.clienteId===c.id?'selected':''}>${esc(c.nome)}${c.cnpj?' ('+c.cnpj+')':''}</option>`
      ).join('');
      extraSel = `<select class="form-control sel-obra" id="cli-${t.id}" onchange="setEstado('${t.id}',{clienteId:this.value})" ${dis}>
        <option value="">— Cliente —</option>${cliOpts}
      </select>`;
    } else if (est.cat === 'distribuicao') {
      const socOpts = socios.map(s =>
        `<option value="${s.id}" ${est.socioId===s.id?'selected':''}>${esc(s.nome)}</option>`
      ).join('');
      extraSel = `<select class="form-control sel-obra" id="soc-${t.id}" onchange="setEstado('${t.id}',{socioId:this.value})" ${dis}>
        <option value="">— Sócio —</option>${socOpts}
      </select>`;
    }

    const descInp = `<input class="form-control inp-desc" id="desc-${t.id}" type="text"
      value="${esc(est.descricao||'')}" placeholder="Descrição..."
      onchange="setEstado('${t.id}',{descricao:this.value})"
      ${dis}>`;

    const btn = lancado || ignorado ? '' :
      est.cat === 'ignorar' ?
        `<button class="btn btn-outline btn-sm" style="white-space:nowrap;" onclick="ignorar('${t.id}')">Ignorar</button>` :
        `<button class="btn btn-primary btn-sm" style="white-space:nowrap;" onclick="lancar('${t.id}')">✓ Lançar</button>`;

    return `<div class="${cls}" id="row-${t.id}">
      <div style="font-size:.82rem;">${formatarData(t.data)}</div>
      <div>${pill}</div>
      <div class="${t.tipo==='credito'?'val-c':'val-d'}">${t.tipo==='credito'?'+':'-'}${formatarMoeda(t.valor)}</div>
      <div class="memo-txt" title="${esc(t.memo)}">${esc(t.memo)}</div>
      <div>${catSel}</div>
      <div>${obraSel}</div>
      <div>${extraSel}</div>
      <div>${descInp}</div>
      <div>${btn}</div>
    </div>`;
  }).join('');

  atualizarStats();
}

function onCatChange(id) {
  const cat = document.getElementById('cat-'+id)?.value;
  const tipo = cat === 'recebimento' ? 'receita' : cat === 'ignorar' ? 'ignorar' : 'despesa';
  setEstado(id, { cat, tipo });
  renderLista();
}

// ── IGNORAR ──
function ignorar(id) {
  setEstado(id, { status: 'ignorado' });
  renderLista();
  toast('Ignorado.', '');
}

// ── LANÇAR ──
async function lancar(id) {
  const t   = OFX_TRANSACOES.find(x => x.id === id);
  const est = getEstado(id);
  if (!est.cat || est.cat === 'ignorar') { toast('Selecione uma categoria.', 'aviso'); return; }
  if (!est.obra && est.cat !== 'distribuicao' && est.cat !== 'recebimento') {
    // Allow sem obra only for dist lucro and others
  }

  const catMap = {
    'recebimento': { tipo: 'receita',  cat: 'adiantamento' },
    'mao-de-obra': { tipo: 'despesa',  cat: 'mao-de-obra'  },
    'distribuicao':{ tipo: 'despesa',  cat: 'outros'        },
    'outros':      { tipo: 'despesa',  cat: 'outros'        },
  };
  const mapeado = catMap[est.cat] || { tipo: 'despesa', cat: 'outros' };

  // Resolver nome do sócio ou cliente para o campo beneficiario
  let beneficiario = '';
  if (est.cat === 'distribuicao' && est.socioId) {
    const s = socios.find(x => x.id === est.socioId);
    if (s) beneficiario = s.nome;
  } else if (est.cat === 'recebimento' && est.clienteId) {
    const c = clientes.find(x => x.id === est.clienteId);
    if (c) beneficiario = c.nome;
  }

  const lanc = {
    id: uid(),
    obraId: est.obra || null,
    tipo: mapeado.tipo,
    categoria: mapeado.cat,
    descricao: est.descricao || t.memo.replace(/Transferência (recebida|enviada) pelo Pix - /i, '').slice(0, 80),
    data: t.data,
    valor: t.valor,
    status: 'pago',
    beneficiario,
    clienteId: est.clienteId || null,
    socioId:   est.socioId   || null,
    formaPagamento: 'PIX',
    dataPagamento: t.data,
    dataVencimento: null,
    isReembolso: false,
    conciliado: true,
    obs: t.memo,
    criadoEm: hoje(),
    ofxId: t.id,
  };

  lancamentos.push(lanc);
  salvarLocal(LS_LANC, lancamentos);
  setEstado(id, { status: 'lancado' });
  renderLista();
  toast(`Lançado: ${formatarMoeda(t.valor)}`, 'sucesso');

  if (configurado()) {
    try {
      shaLanc = await salvarDados('data/lancamentos.json', lancamentos, shaLanc,
        `Extrato: ${lanc.descricao.slice(0,50)}`);
    } catch(e) { toast('Salvo local. Erro sync GitHub: ' + e.message, 'aviso'); }
  }
}

// ── STATS ──
function atualizarStats() {
  const total   = OFX_TRANSACOES.length;
  const lancados  = OFX_TRANSACOES.filter(t => getEstado(t.id).status === 'lancado').length;
  const ignorados = OFX_TRANSACOES.filter(t => getEstado(t.id).status === 'ignorado').length;
  const pend = total - lancados - ignorados;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-lanc').textContent  = lancados;
  document.getElementById('st-pend').textContent  = pend;
  document.getElementById('st-ign').textContent   = ignorados;

  const totalRec = OFX_TRANSACOES
    .filter(t => t.tipo==='credito' && getEstado(t.id).status==='lancado')
    .reduce((s,t)=>s+t.valor,0);
  const totalDes = OFX_TRANSACOES
    .filter(t => t.tipo==='debito' && getEstado(t.id).status==='lancado')
    .reduce((s,t)=>s+t.valor,0);
  document.getElementById('resumo-bar').innerHTML =
    `<span class="res-item"><span class="res-dot" style="background:var(--verde)"></span>Entradas lançadas: <strong>${formatarMoeda(totalRec)}</strong></span>
     <span class="res-item"><span class="res-dot" style="background:var(--vermelho)"></span>Saídas lançadas: <strong>${formatarMoeda(totalDes)}</strong></span>`;
}

init();
</script>
