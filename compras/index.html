<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Construbox — Compras de Obra</title>
  <link rel="stylesheet" href="../assets/core.css"/>
  <style>
    /* ── Obra card ── */
    .obra-card { background:var(--branco); border-radius:12px; box-shadow:0 1px 8px rgba(0,0,0,.07); margin-bottom:20px; overflow:hidden; border:1px solid var(--cinza); }
    .obra-header { background:var(--brand); color:#fff; padding:13px 20px; display:flex; align-items:center; gap:12px; }
    .obra-header-titulo { font-weight:800; font-size:.95rem; }
    .obra-header-sub { font-size:.78rem; opacity:.82; margin-top:1px; }
    .obra-header-badge { background:rgba(255,255,255,.22); border-radius:20px; padding:3px 10px; font-size:.74rem; font-weight:700; margin-left:auto; flex-shrink:0; }

    /* ── Etapa section ── */
    .etapa-section { padding:14px 18px 6px; border-top:1px solid var(--cinza); }
    .etapa-section:first-child { border-top:none; }
    .etapa-nome-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .etapa-num { width:30px; height:30px; border-radius:50%; background:var(--fundo2); border:1px solid var(--cinza); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.78rem; color:var(--texto-leve); flex-shrink:0; }
    .etapa-nome-texto { font-weight:700; font-size:.88rem; }
    .etapa-resp { font-size:.73rem; color:var(--texto-leve); }

    /* ── Material card ── */
    .mat-card { display:flex; align-items:center; gap:12px; background:var(--fundo2); border:1px solid var(--cinza); border-radius:9px; padding:10px 14px; margin-bottom:7px; transition:box-shadow .15s, background .15s; }
    .mat-card:hover { background:var(--branco); box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .mat-card-info { flex:1; min-width:0; }
    .mat-card-nome { font-weight:700; font-size:.84rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mat-card-sub  { font-size:.72rem; color:var(--texto-leve); margin-top:2px; }
    .mat-card-class { font-size:.68rem; background:var(--cinza); color:var(--texto-leve); border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:600; }

    /* ── Progress ── */
    .prog-wrap { display:flex; flex-direction:column; gap:3px; min-width:110px; flex-shrink:0; }
    .prog-label { font-size:.69rem; color:var(--texto-leve); white-space:nowrap; }
    .prog-track { height:6px; background:var(--cinza); border-radius:3px; overflow:hidden; }
    .prog-fill  { height:100%; border-radius:3px; transition:width .4s; }

    /* ── Action buttons ── */
    .btn-pill { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:6px 14px; font-size:.74rem; font-weight:700; cursor:pointer; border:1.5px solid; transition:all .18s; white-space:nowrap; line-height:1; }
    .btn-pill-green  { background:#f0fdf4; color:#16a34a; border-color:#86efac; }
    .btn-pill-green:hover  { background:#16a34a; color:#fff; border-color:#16a34a; }
    .btn-pill-orange { background:#fff7ed; color:#c2410c; border-color:#fdba74; }
    .btn-pill-orange:hover { background:#ea580c; color:#fff; border-color:#ea580c; }
    .btn-pill-done   { background:#f0fdf4; color:#16a34a; border-color:#86efac; cursor:default; opacity:.8; }
    .btns-acao { display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }

    /* ── Status badge override ── */
    .st-pendente  { background:#fee2e2; color:#991b1b; border-radius:20px; padding:3px 10px; font-size:.71rem; font-weight:700; white-space:nowrap; }
    .st-comprado  { background:#fef3c7; color:#92400e; border-radius:20px; padding:3px 10px; font-size:.71rem; font-weight:700; white-space:nowrap; }
    .st-parcial   { background:#dbeafe; color:#1e40af; border-radius:20px; padding:3px 10px; font-size:.71rem; font-weight:700; white-space:nowrap; }
    .st-min_ok    { background:#d1fae5; color:#065f46; border-radius:20px; padding:3px 10px; font-size:.71rem; font-weight:700; white-space:nowrap; }
    .st-entregue  { background:#d1fae5; color:#065f46; border-radius:20px; padding:3px 10px; font-size:.71rem; font-weight:700; white-space:nowrap; }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:56px 24px; color:var(--texto-leve); }
    .empty-state .icon { font-size:2.8rem; margin-bottom:12px; }
    .empty-state .titulo { font-weight:700; font-size:1rem; color:var(--texto); margin-bottom:6px; }
    .empty-state .desc { font-size:.82rem; }

    @media print {
      .topbar, #sidebar-placeholder, .no-print { display:none !important; }
      .main { margin-left:0 !important; }
    }
  </style>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-titulo">Compras de Obra</div>
      <div class="topbar-sub" id="header-sub">Materiais pendentes e pedidos de compra</div>
    </div>
    <div class="topbar-acoes" style="display:flex;gap:8px;align-items:center;">
      <div class="sync-pill">
        <div class="sync-dot amarelo" id="sync-dot"></div>
        <span id="sync-texto">Conectando</span>
      </div>
      <button class="btn btn-outline btn-sm no-print" onclick="window.print()">🖨️ Imprimir</button>
      <button class="btn btn-outline btn-sm no-print" onclick="recarregar()">↻ Atualizar</button>
    </div>
  </div>
  <div class="page">

    <div class="stats-grid">
      <div class="stat vermelho"><div class="valor" id="st-pend">0</div><div class="rotulo">Mat. Pendentes</div></div>
      <div class="stat amarelo"><div class="valor" id="st-sol">0</div><div class="rotulo">Compras Solicitadas</div></div>
      <div class="stat verde"><div class="valor" id="st-ok">0</div><div class="rotulo">Entregues / OK</div></div>
      <div class="stat azul"><div class="valor" id="st-val">R$ 0</div><div class="rotulo">Valor Prev. Total</div></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-body" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="chip ativo" id="tab-pendentes" onclick="setTab('pendentes')">⚠️ Pendentes para Iniciar</button>
        <button class="chip" id="tab-todos"   onclick="setTab('todos')">📦 Todos os Materiais</button>
        <button class="chip" id="tab-pedidos" onclick="setTab('pedidos')">🛒 Pedidos Solicitados</button>
        <div style="flex:1;"></div>
        <select id="filtro-obra" class="form-control" style="width:220px;" onchange="render()">
          <option value="">Todas as Obras</option>
        </select>
      </div>
    </div>

    <div id="conteudo"></div>
  </div>
</div>

<!-- ══ MODAL REGISTRAR ENTREGA ══ -->
<div class="overlay" id="modal-entrega">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h2>📥 Registrar Entrega</h2>
      <button class="btn-fechar" onclick="fecharEntrega()">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px;padding:0 20px 4px;">
      <div style="background:var(--fundo2);padding:10px 14px;border-radius:8px;font-size:.84rem;line-height:1.5;" id="ent-info"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-campo">
          <label>Qtd Entregue (total acumulado)</label>
          <input type="number" id="ent-qtd" min="0" step="0.01"/>
        </div>
        <div class="form-campo">
          <label>Qtd em Pedido (comprada)</label>
          <input type="number" id="ent-comp" min="0" step="0.01"/>
        </div>
      </div>
      <div class="form-campo"><label>Fornecedor</label><input type="text" id="ent-forn"/></div>
      <div class="form-campo"><label>Valor Comprado (R$)</label><input type="number" id="ent-valcomp" min="0" step="0.01"/></div>
      <div class="form-campo"><label>Observação (NF, data…)</label><input type="text" id="ent-obs" placeholder="Ex: NF 4532 – entregue 20/07"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharEntrega()">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarEntrega()">✓ Salvar Entrega</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="../assets/core.js"></script>
<script>
document.getElementById('sidebar-placeholder').innerHTML = buildSidebar('compras');

const PATH_ET = 'data/etapas.json';
const PATH_OB = 'data/obras.json';
const LS_ET   = 'cbx_etapas';
const LS_OB   = 'cbx_obras';

let etapas = [], obras = [], tab = 'pendentes';
let entEtapaId = null, entMatId = null;

const ClassLbl = {
  obrigatorio_iniciar: 'Obrig. Iniciar',
  obrigatorio_execucao: 'Obrig. Exec.',
  complementar: 'Complementar',
  opcional: 'Opcional'
};
const MatSLbl = { pendente:'Pendente', comprado:'Comprado', parcial:'Parcial', min_ok:'Mín OK', entregue:'Entregue' };

function matStatusCalc(m) {
  const prev = m.qtdPrevista || 0;
  const min  = m.qtdMinIniciar || prev;
  const ent  = m.qtdEntregue || 0;
  if (prev > 0 && ent >= prev) return 'entregue';
  if (min > 0  && ent >= min)  return 'min_ok';
  if (ent > 0)                 return 'parcial';
  if (m.pedidoCompra)          return 'comprado';
  return 'pendente';
}

// ── INIT ──
async function init() {
  etapas = carregarLocal(LS_ET) || [];
  obras  = carregarLocal(LS_OB) || [];
  popularFiltroObra(); atualizarStats(); render();

  if (!configurado()) { setSyncStatus('vermelho','Não configurado'); return; }
  setSyncStatus('amarelo','Carregando...');
  try {
    const [rE, rO] = await Promise.all([carregarDados(PATH_ET), carregarDados(PATH_OB)]);
    etapas = rE.lista; salvarLocal(LS_ET, etapas);
    obras  = rO.lista; salvarLocal(LS_OB, obras);
    popularFiltroObra(); atualizarStats(); render();
    setSyncStatus('verde','Conectado');
  } catch(err) { setSyncStatus('vermelho','Erro'); toast('Usando cache local.','aviso'); }
}

async function recarregar() { init(); }

function popularFiltroObra() {
  const sel = document.getElementById('filtro-obra');
  const val = sel.value;
  const ids = [...new Set(etapas.map(e => e.obraId))];
  sel.innerHTML = '<option value="">Todas as Obras</option>' +
    ids.map(id => {
      const o = obras.find(x => x.id === id);
      return `<option value="${id}" ${val===id?'selected':''}>${esc(o?o.nome:id)}</option>`;
    }).join('');
}

function atualizarStats() {
  const filt = document.getElementById('filtro-obra')?.value || '';
  const ets  = etapas.filter(e => !filt || e.obraId === filt);
  let pend=0, sol=0, ok=0, valor=0;
  ets.forEach(e => (e.materiais||[]).forEach(m => {
    const st = matStatusCalc(m);
    if (['pendente','parcial'].includes(st)) pend++;
    if (m.pedidoCompra && !['entregue','min_ok'].includes(st)) sol++;
    if (['entregue','min_ok'].includes(st)) ok++;
    valor += m.valorPrevisto || 0;
  }));
  document.getElementById('st-pend').textContent = pend;
  document.getElementById('st-sol').textContent  = sol;
  document.getElementById('st-ok').textContent   = ok;
  document.getElementById('st-val').textContent  = formatarMoeda(valor);
}

function setTab(t) {
  tab = t;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('ativo'));
  document.getElementById('tab-'+t).classList.add('ativo');
  render();
}

function render() {
  atualizarStats();
  if (tab === 'pendentes') renderPendentes();
  else if (tab === 'todos') renderTodos();
  else renderPedidos();
}

// ── Helpers visuais ──
function progColor(pct) {
  if (pct >= 100) return '#059669';
  if (pct >= 50)  return '#2563eb';
  if (pct > 0)    return '#d97706';
  return '#ef4444';
}

function matCardHtml(m, etapaId, showSolicitar = true) {
  const st  = matStatusCalc(m);
  const min = m.qtdMinIniciar || m.qtdPrevista || 0;
  const ent = m.qtdEntregue || 0;
  const pct = min > 0 ? Math.min(100, Math.round(ent / min * 100)) : 0;

  const btnRegistrar = `<button class="btn-pill btn-pill-green no-print" onclick='abrirEntrega("${etapaId}","${m.id}")'>📥 Registrar entrega</button>`;
  const btnSolicitar = m.pedidoCompra
    ? `<span class="btn-pill btn-pill-done">✓ Compra solicitada</span>`
    : showSolicitar ? `<button class="btn-pill btn-pill-orange no-print" onclick='solicitarCompra("${etapaId}","${m.id}")'>🛒 Solicitar compra</button>` : '';

  return `<div class="mat-card">
    <div class="mat-card-info">
      <div class="mat-card-nome">${esc(m.nome)}<span class="mat-card-class">${ClassLbl[m.classificacao]||m.classificacao}</span></div>
      <div class="mat-card-sub">${m.fornecedor?`Fornec.: ${esc(m.fornecedor)} · `:''}Un.: ${esc(m.unidade||'—')} · Prev.: ${m.qtdPrevista||0}</div>
    </div>
    ${min > 0 ? `<div class="prog-wrap no-print">
      <div class="prog-label">${ent} / ${min} ${esc(m.unidade||'')} entregues</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${progColor(pct)};"></div></div>
    </div>` : ''}
    <span class="st-${st}">${MatSLbl[st]||st}</span>
    <div class="btns-acao">${btnRegistrar}${btnSolicitar}</div>
  </div>`;
}

// ── TAB PENDENTES ──
function renderPendentes() {
  const filt = document.getElementById('filtro-obra').value;
  const obraIds = [...new Set(etapas.map(e => e.obraId))].filter(id => !filt || id === filt);
  let html = '', total = 0;

  obraIds.forEach(obraId => {
    const obra  = obras.find(o => o.id === obraId);
    const etOb  = etapas.filter(e => e.obraId === obraId).sort((a,b)=>(a.ordem||999)-(b.ordem||999));
    const etBloq = etOb.filter(e =>
      (e.materiais||[]).some(m =>
        m.classificacao === 'obrigatorio_iniciar' &&
        (m.qtdMinIniciar||m.qtdPrevista||0) > 0 &&
        (m.qtdEntregue||0) < (m.qtdMinIniciar||m.qtdPrevista||0)
      )
    );
    if (!etBloq.length) return;
    total += etBloq.length;

    html += `<div class="obra-card">
      <div class="obra-header">
        <div>
          <div class="obra-header-titulo">🏗️ ${esc(obra?obra.nome:obraId)}</div>
          ${obra?.cliente?`<div class="obra-header-sub">${esc(obra.cliente)}</div>`:''}
        </div>
        <div class="obra-header-badge">${etBloq.length} etapa(s) bloqueada(s)</div>
      </div>
      ${etBloq.map(e => {
        const pend = (e.materiais||[]).filter(m =>
          m.classificacao === 'obrigatorio_iniciar' &&
          (m.qtdMinIniciar||m.qtdPrevista||0) > 0 &&
          (m.qtdEntregue||0) < (m.qtdMinIniciar||m.qtdPrevista||0)
        );
        return `<div class="etapa-section">
          <div class="etapa-nome-row">
            <div class="etapa-num">${e.ordem||'—'}</div>
            <div>
              <div class="etapa-nome-texto">${esc(e.nome)}</div>
              ${e.responsavel?`<div class="etapa-resp">👤 ${esc(e.responsavel)}</div>`:''}
            </div>
            <span class="badge amarelo" style="margin-left:auto;font-size:.72rem;">⏳ Aguard. Material</span>
          </div>
          ${pend.map(m => matCardHtml(m, e.id)).join('')}
        </div>`;
      }).join('')}
    </div>`;
  });

  document.getElementById('conteudo').innerHTML = total ? html : `<div class="empty-state">
    <div class="icon">✅</div>
    <div class="titulo">Nenhuma etapa aguardando material</div>
    <div class="desc">Todos os materiais obrigatórios estão disponíveis${filt?' nesta obra':''}.</div>
  </div>`;
}

// ── TAB TODOS ──
function renderTodos() {
  const filt = document.getElementById('filtro-obra').value;
  const obraIds = [...new Set(etapas.map(e => e.obraId))].filter(id => !filt || id === filt);
  let html = '', totalMats = 0;

  obraIds.forEach(obraId => {
    const obra = obras.find(o => o.id === obraId);
    const etOb = etapas.filter(e => e.obraId === obraId && (e.materiais||[]).length > 0)
      .sort((a,b)=>(a.ordem||999)-(b.ordem||999));
    if (!etOb.length) return;

    html += `<div class="obra-card">
      <div class="obra-header">
        <div>
          <div class="obra-header-titulo">🏗️ ${esc(obra?obra.nome:obraId)}</div>
          ${obra?.cliente?`<div class="obra-header-sub">${esc(obra.cliente)}</div>`:''}
        </div>
        <div class="obra-header-badge">${etOb.reduce((s,e)=>s+(e.materiais||[]).length,0)} materiais</div>
      </div>
      ${etOb.map(e => {
        totalMats += (e.materiais||[]).length;
        return `<div class="etapa-section">
          <div class="etapa-nome-row">
            <div class="etapa-num">${e.ordem||'—'}</div>
            <div>
              <div class="etapa-nome-texto">${esc(e.nome)}</div>
              ${e.responsavel?`<div class="etapa-resp">👤 ${esc(e.responsavel)}</div>`:''}
            </div>
            <span style="margin-left:auto;font-size:.73rem;color:var(--texto-leve);">${(e.materiais||[]).length} material(is)</span>
          </div>
          ${(e.materiais||[]).map(m => matCardHtml(m, e.id, !m.pedidoCompra)).join('')}
        </div>`;
      }).join('')}
    </div>`;
  });

  document.getElementById('conteudo').innerHTML = totalMats ? html : `<div class="empty-state">
    <div class="icon">📦</div>
    <div class="titulo">Nenhum material cadastrado</div>
    <div class="desc">Acesse o Cronograma de cada obra para adicionar materiais às etapas.</div>
  </div>`;
}

// ── TAB PEDIDOS ──
function renderPedidos() {
  const filt = document.getElementById('filtro-obra').value;
  const rows = [];
  etapas.filter(e => !filt || e.obraId === filt).forEach(e => {
    const obra = obras.find(o => o.id === e.obraId);
    (e.materiais||[]).filter(m => m.pedidoCompra).forEach(m => rows.push({ e, obra, m }));
  });

  if (!rows.length) {
    document.getElementById('conteudo').innerHTML = `<div class="empty-state">
      <div class="icon">🛒</div>
      <div class="titulo">Nenhuma compra solicitada</div>
      <div class="desc">Acesse o Cronograma → 📦 Materiais de uma etapa e clique em <strong>🛒 Solicitar compra</strong>.</div>
    </div>`;
    return;
  }

  rows.sort((a,b) => {
    const ord = {pendente:0,parcial:1,comprado:2,min_ok:3,entregue:4};
    return (ord[matStatusCalc(a.m)]??9) - (ord[matStatusCalc(b.m)]??9);
  });

  // Agrupar por obra
  const porObra = {};
  rows.forEach(r => {
    const k = r.e.obraId;
    if (!porObra[k]) porObra[k] = [];
    porObra[k].push(r);
  });

  let html = '';
  Object.entries(porObra).forEach(([obraId, items]) => {
    const obra = obras.find(o => o.id === obraId);
    html += `<div class="obra-card">
      <div class="obra-header">
        <div>
          <div class="obra-header-titulo">🏗️ ${esc(obra?obra.nome:obraId)}</div>
          ${obra?.cliente?`<div class="obra-header-sub">${esc(obra.cliente)}</div>`:''}
        </div>
        <div class="obra-header-badge">${items.length} pedido(s)</div>
      </div>
      <div style="padding:12px 18px;">
        ${items.map(({e, m}) => {
          const st  = matStatusCalc(m);
          const min = m.qtdMinIniciar || m.qtdPrevista || 0;
          const ent = m.qtdEntregue || 0;
          const pct = min > 0 ? Math.min(100, Math.round(ent / min * 100)) : 0;
          return `<div class="mat-card">
            <div class="mat-card-info">
              <div class="mat-card-nome">${esc(m.nome)}<span class="mat-card-class">${ClassLbl[m.classificacao]||m.classificacao}</span></div>
              <div class="mat-card-sub">Etapa: <strong>${esc(e.nome)}</strong>${m.fornecedor?` · Fornec.: ${esc(m.fornecedor)}`:''}</div>
            </div>
            ${min > 0 ? `<div class="prog-wrap no-print">
              <div class="prog-label">${ent} / ${min} ${esc(m.unidade||'')} entregues</div>
              <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${progColor(pct)};"></div></div>
            </div>` : ''}
            <span class="st-${st}">${MatSLbl[st]||st}</span>
            <div class="btns-acao">
              <button class="btn-pill btn-pill-green no-print" onclick='abrirEntrega("${e.id}","${m.id}")'>📥 Registrar entrega</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  document.getElementById('conteudo').innerHTML = html;
}

// ── MODAL ENTREGA ──
function abrirEntrega(etapaId, matId) {
  const e = etapas.find(x => x.id === etapaId); if (!e) return;
  const m = (e.materiais||[]).find(x => x.id === matId); if (!m) return;
  entEtapaId = etapaId; entMatId = matId;
  document.getElementById('ent-info').innerHTML =
    `<strong>${esc(m.nome)}</strong><br>
     Etapa: ${esc(e.nome)}<br>
     Previsto: <strong>${m.qtdPrevista||0} ${esc(m.unidade||'')}</strong>
     · Mín iniciar: <strong>${m.qtdMinIniciar||'—'} ${esc(m.unidade||'')}</strong>
     · Entregue atual: <strong>${m.qtdEntregue||0} ${esc(m.unidade||'')}</strong>`;
  document.getElementById('ent-qtd').value     = m.qtdEntregue||0;
  document.getElementById('ent-comp').value    = m.qtdComprada||0;
  document.getElementById('ent-forn').value    = m.fornecedor||'';
  document.getElementById('ent-valcomp').value = m.valorComprado||0;
  document.getElementById('ent-obs').value     = m.obs||'';
  document.getElementById('modal-entrega').classList.add('aberto');
  setTimeout(()=>document.getElementById('ent-qtd').focus(), 80);
}

async function confirmarEntrega() {
  const e = etapas.find(x => x.id === entEtapaId); if (!e) return;
  const m = (e.materiais||[]).find(x => x.id === entMatId); if (!m) return;
  m.qtdEntregue  = parseFloat(document.getElementById('ent-qtd').value)||0;
  m.qtdComprada  = parseFloat(document.getElementById('ent-comp').value)||0;
  m.fornecedor   = document.getElementById('ent-forn').value.trim();
  m.valorComprado= parseFloat(document.getElementById('ent-valcomp').value)||0;
  m.obs          = document.getElementById('ent-obs').value.trim();
  fecharEntrega();
  await syncEtapas(`Entrega: ${m.nome} — ${e.nome}`);
  render(); atualizarStats();
  toast(`Entrega registrada: ${m.nome}`, 'sucesso');
}

function fecharEntrega() { document.getElementById('modal-entrega').classList.remove('aberto'); }

async function solicitarCompra(etapaId, matId) {
  const e = etapas.find(x => x.id === etapaId); if (!e) return;
  const m = (e.materiais||[]).find(x => x.id === matId); if (!m) return;
  m.pedidoCompra    = true;
  m.solicitacaoData = hoje();
  await syncEtapas(`Solicitação: ${m.nome}`);
  render(); atualizarStats();
  toast(`Compra solicitada: ${m.nome}`, 'sucesso');
}

async function syncEtapas(msg) {
  salvarLocal(LS_ET, etapas);
  if (!configurado()) return;
  setSyncStatus('amarelo','Sincronizando...');
  try {
    const cur = await ghGet(PATH_ET);
    await salvarDados(PATH_ET, etapas, cur?.sha||null, msg);
    setSyncStatus('verde','Sincronizado');
  } catch(err) {
    setSyncStatus('vermelho','Erro sync');
    toast('Erro: '+err.message,'aviso');
  }
}

init();
</script>
</body>
</html>
