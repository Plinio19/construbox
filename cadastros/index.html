<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Construbox — Cadastros</title>
  <link rel="stylesheet" href="../assets/core.css"/>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-titulo">Cadastros</div>
      <div class="topbar-sub">Sócios e Clientes</div>
    </div>
    <div class="topbar-acoes">
      <div class="sync-pill">
        <div class="sync-dot amarelo" id="sync-dot"></div>
        <span id="sync-texto">Conectando</span>
      </div>
    </div>
  </div>
  <div class="page" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;">

    <!-- ── SÓCIOS ── -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>👥 Sócios</h2>
          <button class="btn btn-primary btn-sm" onclick="abrirModalSocio()">+ Novo Sócio</button>
        </div>
        <div class="card-body" id="lista-socios">
          <div style="text-align:center;padding:24px;color:var(--texto-leve);">Carregando...</div>
        </div>
      </div>
    </div>

    <!-- ── CLIENTES ── -->
    <div>
      <div class="card">
        <div class="card-header">
          <h2>🏢 Clientes</h2>
          <button class="btn btn-primary btn-sm" onclick="abrirModalCliente()">+ Novo Cliente</button>
        </div>
        <div class="card-body" id="lista-clientes">
          <div style="text-align:center;padding:24px;color:var(--texto-leve);">Carregando...</div>
        </div>
      </div>
    </div>

    <!-- ── PRESTADORES / FUNCIONÁRIOS ── -->
    <div style="grid-column:1/-1;">
      <div class="card">
        <div class="card-header">
          <h2>🔨 Prestadores & Funcionários</h2>
          <button class="btn btn-primary btn-sm" onclick="abrirModalPrestador()">+ Novo Prestador</button>
        </div>
        <div class="card-body" id="lista-prestadores">
          <div style="text-align:center;padding:24px;color:var(--texto-leve);">Carregando...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL SÓCIO -->
<div class="overlay" id="modal-socio">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2 id="msoc-titulo">Novo Sócio</h2>
      <button class="btn-fechar" onclick="fecharModal('modal-socio')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="msoc-id"/>
      <div class="form-campo"><label>Nome *</label><input id="msoc-nome" type="text" placeholder="Nome completo"/></div>
      <div class="form-campo"><label>CPF</label><input id="msoc-cpf" type="text" placeholder="000.000.000-00"/></div>
      <div class="form-campo"><label>Participação (%)</label><input id="msoc-pct" type="number" min="0" max="100" step="1" value="50" placeholder="50"/></div>
      <div class="form-campo"><label>Observações</label><textarea id="msoc-obs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal('modal-socio')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarSocio()">✓ Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PRESTADOR -->
<div class="overlay" id="modal-prestador">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h2 id="mprest-titulo">Novo Prestador</h2>
      <button class="btn-fechar" onclick="fecharModal('modal-prestador')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mprest-id"/>
      <div class="form-campo"><label>Nome *</label><input id="mprest-nome" type="text" placeholder="Nome completo"/></div>
      <div class="form-campo"><label>CPF / CNPJ</label><input id="mprest-doc" type="text" placeholder="000.000.000-00"/></div>
      <div class="form-campo"><label>Função / Serviço</label><input id="mprest-funcao" type="text" placeholder="Ex: Pedreiro, Eletricista, Pintor..."/></div>
      <div class="form-campo"><label>Telefone</label><input id="mprest-tel" type="text" placeholder="(00) 00000-0000"/></div>
      <div class="form-campo"><label>Chave PIX</label><input id="mprest-pix" type="text" placeholder="CPF, e-mail, telefone ou chave aleatória"/></div>
      <div class="form-campo"><label>Observações</label><textarea id="mprest-obs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal('modal-prestador')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarPrestador()">✓ Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="overlay" id="modal-cliente">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <h2 id="mcli-titulo">Novo Cliente</h2>
      <button class="btn-fechar" onclick="fecharModal('modal-cliente')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mcli-id"/>
      <div class="form-campo"><label>Razão Social / Nome *</label><input id="mcli-nome" type="text" placeholder="Ex: HOTEL IN BOX LTDA"/></div>
      <div class="form-campo">
        <label>CNPJ / CPF</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="mcli-cnpj" type="text" placeholder="00.000.000/0001-00" style="flex:1;"/>
          <button class="btn btn-outline btn-sm" onclick="buscarCNPJ()" title="Buscar dados pelo CNPJ">🔍 Buscar</button>
        </div>
        <span class="hint">Informe o CNPJ e clique em Buscar para preencher automaticamente.</span>
      </div>
      <div class="form-campo"><label>Contato (nome)</label><input id="mcli-contato" type="text"/></div>
      <div class="form-campo"><label>E-mail</label><input id="mcli-email" type="email"/></div>
      <div class="form-campo"><label>Telefone</label><input id="mcli-tel" type="text"/></div>
      <div class="form-campo"><label>Observações</label><textarea id="mcli-obs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarCliente()">✓ Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="../assets/core.js"></script>
<script>
document.getElementById('sidebar-placeholder').innerHTML = buildSidebar('cadastros');

let socios      = []; let shaS = null;
let clientes    = []; let shaC = null;
let prestadores = []; let shaP = null;

async function init() {
  socios      = carregarLocal('cbx_socios')      || [];
  clientes    = carregarLocal('cbx_clientes')    || [];
  prestadores = carregarLocal('cbx_prestadores') || [];
  renderSocios(); renderClientes(); renderPrestadores();

  if (!configurado()) { setSyncStatus('vermelho','Não configurado'); return; }
  setSyncStatus('amarelo','Carregando...');
  try {
    const [rS, rC, rP] = await Promise.all([
      carregarDados('data/socios.json'),
      carregarDados('data/clientes.json'),
      carregarDados('data/prestadores.json'),
    ]);
    socios      = rS.lista; shaS = rS.sha;
    clientes    = rC.lista; shaC = rC.sha;
    prestadores = rP.lista; shaP = rP.sha;
    salvarLocal('cbx_socios',      socios);
    salvarLocal('cbx_clientes',    clientes);
    salvarLocal('cbx_prestadores', prestadores);
    renderSocios(); renderClientes(); renderPrestadores();
    setSyncStatus('verde','Conectado');
  } catch(e) { setSyncStatus('vermelho','Erro'); }
}

// ── RENDER SÓCIOS ──
function renderSocios() {
  const cont = document.getElementById('lista-socios');
  if (!socios.length) { cont.innerHTML = `<div style="text-align:center;padding:24px;color:var(--texto-leve);">Nenhum sócio cadastrado.</div>`; return; }
  cont.innerHTML = socios.map(s => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--cinza);">
      <div>
        <div style="font-weight:700;">${esc(s.nome)}</div>
        <div style="font-size:.8rem;color:var(--texto-leve);">
          ${s.cpf ? `CPF: ${esc(s.cpf)} · ` : ''}${s.percentual != null ? `${s.percentual}% de participação` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick='editarSocio("${s.id}")'>✏️</button>
        <button class="btn btn-outline btn-sm" style="color:var(--vermelho);" onclick='excluirSocio("${s.id}")'>🗑</button>
      </div>
    </div>`).join('');
}

// ── RENDER CLIENTES ──
function renderClientes() {
  const cont = document.getElementById('lista-clientes');
  if (!clientes.length) { cont.innerHTML = `<div style="text-align:center;padding:24px;color:var(--texto-leve);">Nenhum cliente cadastrado.</div>`; return; }
  cont.innerHTML = clientes.map(c => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--cinza);">
      <div>
        <div style="font-weight:700;">${esc(c.nome)}</div>
        <div style="font-size:.8rem;color:var(--texto-leve);">
          ${c.cnpj ? `CNPJ: ${esc(c.cnpj)}` : ''}${c.contato ? ` · ${esc(c.contato)}` : ''}
          ${c.telefone ? ` · ${esc(c.telefone)}` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick='editarCliente("${c.id}")'>✏️</button>
        <button class="btn btn-outline btn-sm" style="color:var(--vermelho);" onclick='excluirCliente("${c.id}")'>🗑</button>
      </div>
    </div>`).join('');
}

// ── MODAIS ──
function fecharModal(id) { document.getElementById(id).classList.remove('aberto'); }

function abrirModalSocio(s) {
  document.getElementById('msoc-titulo').textContent = s ? 'Editar Sócio' : 'Novo Sócio';
  document.getElementById('msoc-id').value    = s?.id    || '';
  document.getElementById('msoc-nome').value  = s?.nome  || '';
  document.getElementById('msoc-cpf').value   = s?.cpf   || '';
  document.getElementById('msoc-pct').value   = s?.percentual ?? 50;
  document.getElementById('msoc-obs').value   = s?.obs   || '';
  document.getElementById('modal-socio').classList.add('aberto');
}

function editarSocio(id) { abrirModalSocio(socios.find(x=>x.id===id)); }

async function salvarSocio() {
  const nome = document.getElementById('msoc-nome').value.trim();
  if (!nome) { toast('Informe o nome.','aviso'); return; }
  const id = document.getElementById('msoc-id').value || uid();
  const obj = { id, nome, cpf: document.getElementById('msoc-cpf').value.trim(),
    percentual: parseFloat(document.getElementById('msoc-pct').value)||0,
    obs: document.getElementById('msoc-obs').value.trim(), criadoEm: hoje() };
  socios = socios.filter(x=>x.id!==id); socios.push(obj);
  salvarLocal('cbx_socios', socios); renderSocios(); fecharModal('modal-socio');
  toast('Sócio salvo!','sucesso');
  if (configurado()) try { shaS = await salvarDados('data/socios.json', socios, shaS, `Sócio: ${nome}`); } catch(e) { toast('Erro sync','aviso'); }
}

async function excluirSocio(id) {
  if (!confirm('Excluir sócio?')) return;
  socios = socios.filter(x=>x.id!==id);
  salvarLocal('cbx_socios', socios); renderSocios();
  if (configurado()) try { shaS = await salvarDados('data/socios.json', socios, shaS, 'Excluir sócio'); } catch(e) {}
}

function abrirModalCliente(c) {
  document.getElementById('mcli-titulo').textContent  = c ? 'Editar Cliente' : 'Novo Cliente';
  document.getElementById('mcli-id').value     = c?.id      || '';
  document.getElementById('mcli-nome').value   = c?.nome    || '';
  document.getElementById('mcli-cnpj').value   = c?.cnpj    || '';
  document.getElementById('mcli-contato').value= c?.contato || '';
  document.getElementById('mcli-email').value  = c?.email   || '';
  document.getElementById('mcli-tel').value    = c?.telefone|| '';
  document.getElementById('mcli-obs').value    = c?.obs     || '';
  document.getElementById('modal-cliente').classList.add('aberto');
}

function editarCliente(id) { abrirModalCliente(clientes.find(x=>x.id===id)); }

async function buscarCNPJ() {
  const cnpj = document.getElementById('mcli-cnpj').value.replace(/\D/g,'');
  if (cnpj.length !== 14) { toast('CNPJ inválido (14 dígitos).','aviso'); return; }
  toast('Buscando...','');
  try {
    const r = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
    if (!r.ok) throw new Error('Não encontrado');
    const d = await r.json();
    document.getElementById('mcli-nome').value    = d.razao_social || '';
    document.getElementById('mcli-email').value   = d.email || '';
    document.getElementById('mcli-tel').value     = d.ddd_telefone_1 ? `(${d.ddd_telefone_1}) ${d.telefone_1||''}` : '';
    document.getElementById('mcli-cnpj').value    = cnpj.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
    toast('Dados preenchidos!','sucesso');
  } catch(e) { toast('CNPJ não encontrado na Receita Federal.','aviso'); }
}

async function salvarCliente() {
  const nome = document.getElementById('mcli-nome').value.trim();
  if (!nome) { toast('Informe o nome.','aviso'); return; }
  const id = document.getElementById('mcli-id').value || uid();
  const obj = { id, nome, cnpj: document.getElementById('mcli-cnpj').value.trim(),
    contato: document.getElementById('mcli-contato').value.trim(),
    email:   document.getElementById('mcli-email').value.trim(),
    telefone:document.getElementById('mcli-tel').value.trim(),
    obs:     document.getElementById('mcli-obs').value.trim(), criadoEm: hoje() };
  clientes = clientes.filter(x=>x.id!==id); clientes.push(obj);
  salvarLocal('cbx_clientes', clientes); renderClientes(); fecharModal('modal-cliente');
  toast('Cliente salvo!','sucesso');
  if (configurado()) try { shaC = await salvarDados('data/clientes.json', clientes, shaC, `Cliente: ${nome}`); } catch(e) { toast('Erro sync','aviso'); }
}

async function excluirCliente(id) {
  if (!confirm('Excluir cliente?')) return;
  clientes = clientes.filter(x=>x.id!==id);
  salvarLocal('cbx_clientes', clientes); renderClientes();
  if (configurado()) try { shaC = await salvarDados('data/clientes.json', clientes, shaC, 'Excluir cliente'); } catch(e) {}
}

// ── RENDER PRESTADORES ──
function renderPrestadores() {
  const cont = document.getElementById('lista-prestadores');
  if (!prestadores.length) {
    cont.innerHTML = `<div style="text-align:center;padding:24px;color:var(--texto-leve);">Nenhum prestador cadastrado.</div>`;
    return;
  }
  cont.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0;">` +
    prestadores.map(p => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 8px;border-bottom:1px solid var(--cinza);">
        <div>
          <div style="font-weight:700;">${esc(p.nome)}</div>
          <div style="font-size:.78rem;color:var(--texto-leve);">
            ${p.funcao ? `${esc(p.funcao)}` : ''}
            ${p.doc ? ` · ${esc(p.doc)}` : ''}
            ${p.pix ? ` · PIX: ${esc(p.pix)}` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button class="btn btn-outline btn-sm" onclick='editarPrestador("${p.id}")'>✏️</button>
          <button class="btn btn-outline btn-sm" style="color:var(--vermelho);" onclick='excluirPrestador("${p.id}")'>🗑</button>
        </div>
      </div>`).join('') + `</div>`;
}

function abrirModalPrestador(p) {
  document.getElementById('mprest-titulo').textContent = p ? 'Editar Prestador' : 'Novo Prestador';
  document.getElementById('mprest-id').value     = p?.id     || '';
  document.getElementById('mprest-nome').value   = p?.nome   || '';
  document.getElementById('mprest-doc').value    = p?.doc    || '';
  document.getElementById('mprest-funcao').value = p?.funcao || '';
  document.getElementById('mprest-tel').value    = p?.telefone || '';
  document.getElementById('mprest-pix').value    = p?.pix    || '';
  document.getElementById('mprest-obs').value    = p?.obs    || '';
  document.getElementById('modal-prestador').classList.add('aberto');
}

function editarPrestador(id) { abrirModalPrestador(prestadores.find(x=>x.id===id)); }

async function salvarPrestador() {
  const nome = document.getElementById('mprest-nome').value.trim();
  if (!nome) { toast('Informe o nome.','aviso'); return; }
  const id = document.getElementById('mprest-id').value || uid();
  const obj = {
    id, nome,
    doc:      document.getElementById('mprest-doc').value.trim(),
    funcao:   document.getElementById('mprest-funcao').value.trim(),
    telefone: document.getElementById('mprest-tel').value.trim(),
    pix:      document.getElementById('mprest-pix').value.trim(),
    obs:      document.getElementById('mprest-obs').value.trim(),
    criadoEm: hoje(),
  };
  prestadores = prestadores.filter(x=>x.id!==id); prestadores.push(obj);
  salvarLocal('cbx_prestadores', prestadores); renderPrestadores(); fecharModal('modal-prestador');
  toast('Prestador salvo!','sucesso');
  if (configurado()) try { shaP = await salvarDados('data/prestadores.json', prestadores, shaP, `Prestador: ${nome}`); } catch(e) { toast('Erro sync','aviso'); }
}

async function excluirPrestador(id) {
  if (!confirm('Excluir prestador?')) return;
  prestadores = prestadores.filter(x=>x.id!==id);
  salvarLocal('cbx_prestadores', prestadores); renderPrestadores();
  if (configurado()) try { shaP = await salvarDados('data/prestadores.json', prestadores, shaP, 'Excluir prestador'); } catch(e) {}
}

document.querySelectorAll('.overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('aberto'); }));
init();
</script>
</body>
</html>
